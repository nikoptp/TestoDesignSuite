name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify lint
        run: npm run lint

      - name: Verify unit tests
        run: npm run test:unit

      - name: Verify tag matches package version
        run: node scripts/check-release-version.js

      - name: Install NSIS
        run: choco install nsis -y --no-progress

      - name: Build custom Windows installer (NSIS)
        run: npm run build:windows:custom-installer

      - name: Generate installer checksums
        shell: pwsh
        run: |
          Get-ChildItem -Path out/custom-installer -Filter *.exe -File | ForEach-Object {
            $hash = (Get-FileHash -Algorithm SHA256 -Path $_.FullName).Hash.ToLowerInvariant()
            Set-Content -Path "$($_.FullName).sha256" -Value "$hash  $($_.Name)" -NoNewline
          }

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            out/custom-installer/**/*
